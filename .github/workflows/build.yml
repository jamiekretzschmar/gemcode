name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch: # This allows you to trigger a build manually from the GitHub website

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install NPM Dependencies
        run: npm install

      - name: Build Vite Frontend
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          echo "GEMINI_API_KEY=$GEMINI_API_KEY" >> .env
          npm run build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

  - name: Sync Capacitor
    run: |
      ls -R android/app/src/main/res # This verifies the folder actually exists
      npm install -g @capacitor/cli
      npx cap sync android


      - name: Build the APK
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: gemcode-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

